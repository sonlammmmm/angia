# ─── Test Database (H2 in-memory) ────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Tự tạo bảng theo Entity — không cần schema thật khi test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# ─── JWT (giá trị dummy dùng cho test) ───────────────────────────────────────
app.jwt.secret=dGVzdF9zZWNyZXRfa2V5X2Zvcl91bml0X3Rlc3Rpbmdfb25seV8xMjM=
app.jwt.expiration=3600
app.jwt.refresh-expiration=604800

# ─── CORS ────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173

# ─── PayPal (dummy for tests) ───────────────────────────────────────────────
paypal.mode=sandbox
paypal.client.id=test-client-id
paypal.client.secret=test-client-secret
paypal.exchange-rate=25000
paypal.currency=USD
paypal.frontend-success-url=http://localhost:5173/payment/success
paypal.frontend-cancel-url=http://localhost:5173/payment/cancel
