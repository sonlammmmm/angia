spring.application.name=management

# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/angia
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ─────────────────────────────────────────────────────────────────────
# HMAC-SHA256 secret key — base64-encoded, >= 256-bit
# Đọc từ biến môi trường JWT_SECRET (xem file .env)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:3600}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800}

# ─── Server ──────────────────────────────────────────────────────────────────
server.servlet.context-path=/api/v1

# ─── CORS ────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
