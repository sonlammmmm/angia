# ─── PayPal ─────────────────────────────────────────────────────────────────
paypal.mode=${PAYPAL_MODE:sandbox}
paypal.client.id=${PAYPAL_CLIENT_ID:}
paypal.client.secret=${PAYPAL_CLIENT_SECRET:}
paypal.exchange-rate=${PAYPAL_EXCHANGE_RATE:25000}
paypal.currency=${PAYPAL_CURRENCY:USD}
paypal.frontend-success-url=${PAYPAL_SUCCESS_URL:http://localhost:5173/payment/success}
paypal.frontend-cancel-url=${PAYPAL_CANCEL_URL:http://localhost:5173/payment/cancel}