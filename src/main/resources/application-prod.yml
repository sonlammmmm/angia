spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:3306/angia
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  upload:
    dir: ${UPLOAD_DIR:/var/www/angia/uploads}

logging:
  level:
    vn.dichvuangia: WARN
    org.springframework.security: WARN
  file:
    name: /var/log/angia/app-prod.log


