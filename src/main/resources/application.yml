spring:
  application:
    name: management
  profiles:
    active: dev
  config:
    import: "optional:file:.env[.properties],optional:file:angia-backend/.env[.properties]"
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  servlet:
    context-path: /api/v1

app:
  jwt:
    expiration: 3600
    refresh-expiration: 604800
  rate-limit:
    enabled: true
    max-requests: 100
    window-seconds: 3600
    login-max-requests: 5
    login-window-seconds: 60
    register-max-requests: 3
    register-window-seconds: 60
    refresh-max-requests: 10
    refresh-window-seconds: 60
    trust-forwarded-for: false
    max-buckets: 100000
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
